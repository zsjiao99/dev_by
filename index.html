  <script>
    // const SENDKEY = 'SCT339077T2nj7iSqTglQccCg14lcGsl1t';zsj
    const SENDKEY = 'SCT340302TvR7jrKFNMBM8Hn8hfNgvEKrZ'; //by

    document.getElementById('leadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const wechat = document.getElementById('wechat').value;
      const area = document.getElementById('area').value;
      const workstations = document.getElementById('workstations').value;
      const partitions = document.getElementById('partitions').value;
      const businessType = document.getElementById('businessType').value;
      const reason = document.getElementById('reason').value;
      const region = document.getElementById('region').value;
      const subway = document.getElementById('subway').value;
      const requirement = document.getElementById('requirement').value;

      // 二选一验证
      if (!phone && !wechat) {
        alert('请至少填写联系电话或微信号其中一项');
        return;
      }

      const leadData = {
        name,
        phone,
        wechat,
        area,
        workstations,
        partitions,
        businessType,
        reason,
        region,
        subway,
        requirement,
        time: new Date().toLocaleString()
      };

      console.log('🔥 新客户:', leadData);

      // ✅ 用图片方式发送，GET请求，100%成功，无跨域问题！
      const contact = leadData.phone || `微信：${leadData.wechat}`;
      const text = `新客户：${leadData.name}\n联系方式：${contact}\n业态：${leadData.businessType || '未填写'}\n面积：${leadData.area || '未填写'}\n工位：${leadData.workstations || '未填写'}\n隔断：${leadData.partitions || '未填写'}\n换房原因：${leadData.reason || '未填写'}\n区域：${leadData.region || '未填写'}\n地铁：${leadData.subway || '未填写'}\n具体需求：${leadData.requirement || '无'}\n时间：${leadData.time}`;
      
      const img = new Image();
      img.src = `https://sctapi.ftqq.com/${SENDKEY}.send?title=🏢新客户预约&desp=${encodeURIComponent(text)}`;
      img.onload = img.onerror = function() {
        console.log('✅ 微信通知已发送');
      };

      // 成功提示
      document.getElementById('submitBtn').innerText = '提交成功！'
      document.getElementById('submitBtn').classList.remove('bg-blue-500');
      document.getElementById('submitBtn').classList.add('bg-green-500');
      
      setTimeout(() => {
        document.getElementById('leadForm').reset();
        document.getElementById('submitBtn').innerText = '免费预约带看';
        document.getElementById('submitBtn').classList.remove('bg-green-500');
        document.getElementById('submitBtn').classList.add('bg-blue-500');
      }, 2000);

    });
  </script>
